version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: softmeter_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-softmeter}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-softmeter123}
      POSTGRES_DB: ${DB_NAME:-softmeter_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-softmeter} -d ${DB_NAME:-softmeter_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: softmeter_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER:-softmeter}:${DB_PASSWORD:-softmeter123}@db:5432/${DB_NAME:-softmeter_db}
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    ports:
      - "3001:3001"
    volumes:
      - ./src/backend:/app
      - /app/node_modules
    command: npm run dev

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: softmeter_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data: