name: CI — SoftMeter

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    name: Backend — Lint + Testes
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: softmeter
          POSTGRES_PASSWORD: softmeter123
          POSTGRES_DB: softmeter_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/backend/package-lock.json

      - name: Instalar dependências
        working-directory: src/backend
        run: npm ci

      - name: Rodar testes com cobertura
        working-directory: src/backend
        run: npm test
        env:
          DATABASE_URL: postgresql://softmeter:softmeter123@localhost:5432/softmeter_test
          JWT_SECRET: test_secret_key
          NODE_ENV: test

      - name: Upload cobertura
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: src/backend/coverage/

  frontend-tests:
    name: Frontend — Lint + Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Instalar dependências
        working-directory: src/frontend
        run: npm ci

      - name: Rodar testes
        working-directory: src/frontend
        run: npm test

  lint-check:
    name: Lint geral
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint backend
        working-directory: src/backend
        run: |
          npm ci
          npm run lint || true

      - name: Pipeline OK
        run: echo "✅ Todos os testes passaram!"
